<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boy or Girl?</title>
    <style>
        :root {
            /* Colors */
            --bg-color: #a0d9ef;
            --pink-main: #f0b4bc;
            --pink-dark: #e59ba5;
            --pink-soft: #fae1e4;
            --text-dark: #4f4f4f;
            --boy-blue: #88c9d9;
            --girl-pink: #f4a6b5;
            
            /* Desktop Base Scale */
            --scale: 1; 
        }

        /* --- MOBILE MEDIA QUERIES --- */
        @media (max-width: 600px) {
            :root {
                --scale: 0.75; /* Shrink to 75% for tablets/large phones */
            }
            .main-title {
                font-size: 2.2rem !important;
                margin: 0 0 30px 0 !important;
            }
        }

        @media (max-width: 400px) {
            :root {
                --scale: 0.65; /* Shrink to 65% for small phones */
            }
            .main-title {
                font-size: 1.8rem !important;
            }
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Title Style */
        .main-title {
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-size: 3rem;
            color: var(--text-dark);
            margin: 0 0 50px 0;
            letter-spacing: 2px;
            text-align: center;
            z-index: 10;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease;
        }

        .main-title.fade-out {
            transform: translateY(-40px);
            opacity: 0;
            pointer-events: none;
        }

        /* Envelope Container */
        .envelope-wrapper {
            position: relative;
            cursor: pointer;
            width: 450px;
            height: 300px;
            /* Apply the scale variable here */
            transform: scale(var(--scale)) translateY(0);
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 1. Base Backboard */
        .envelope-back {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: var(--pink-main);
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            z-index: 1;
        }

        /* 2. Top Flap */
        .top-flap {
            position: absolute;
            top: 0;
            left: 0;
            border-left: 225px solid transparent;
            border-right: 225px solid transparent;
            border-top: 155px solid var(--pink-dark);
            transform-origin: top;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), z-index 0.3s;
            z-index: 5;
        }

        /* 3. Front Flaps Pocket */
        .envelope-front-pocket {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 4;
            pointer-events: none;
        }

        .envelope-front-pocket::before {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            border-left: 225px solid var(--pink-soft);
            border-right: 225px solid transparent;
            border-bottom: 300px solid transparent;
            border-bottom-left-radius: 12px;
        }

        .envelope-front-pocket::after {
            content: "";
            position: absolute;
            bottom: 0;
            right: 0;
            border-right: 225px solid var(--pink-soft);
            border-left: 225px solid transparent;
            border-bottom: 300px solid transparent;
            border-bottom-right-radius: 12px;
        }

        .bottom-flap {
            position: absolute;
            bottom: 0;
            left: 0;
            border-left: 225px solid transparent;
            border-right: 225px solid transparent;
            border-bottom: 150px solid var(--pink-main);
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
            z-index: 4;
            filter: drop-shadow(0 -3px 5px rgba(0,0,0,0.05));
        }

        /* 4. The Invitation Card */
        .card {
            position: absolute;
            bottom: 10px;
            left: 25px;
            width: 400px;
            height: 270px;
            background-color: #fdfdfd;
            border-radius: 8px;
            z-index: 2; 
            padding: 35px 25px 25px 25px;
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            text-align: center;
            border: 1px solid #f2f2f2;
            
            opacity: 0;
            transform: translateY(0) scale(0.95);
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease, z-index 0.5s;
        }

        /* Gender Reveal Specific Styling */
        .gender-reveal-title {
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif;
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .word-boy {
            color: var(--boy-blue);
        }

        .word-or {
            color: var(--text-dark);
            font-size: 1.5rem;
            margin: 0 8px;
            vertical-align: middle;
            font-family: Georgia, serif;
        }

        .word-girl {
            color: var(--girl-pink);
        }

        .card p.subtitle {
            font-size: 1rem;
            color: #727272;
            margin: 10px 0 25px 0;
            line-height: 1.5;
            font-family: Georgia, serif;
            font-style: italic;
        }

        .event-details {
            border-top: 1px dashed #ddd;
            border-bottom: 1px dashed #ddd;
            padding: 15px 0;
            width: 100%;
            margin-top: auto;
            margin-bottom: 10px;
        }

        .event-details p {
            margin: 0;
        }

        /* --- ANIMATION TRANSITIONS --- */
        .envelope-wrapper.open {
            /* Keep scale applied during the open state translation */
            transform: scale(var(--scale)) translateY(60px);
        }

        .envelope-wrapper.open .top-flap {
            transform: rotateX(180deg);
            z-index: 1; 
        }

        .envelope-wrapper.open .card {
            opacity: 1;
            transform: translateY(-250px) scale(1);
            z-index: 6; 
            height: 310px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <h1 class="main-title" id="mainTitle">You are Invited!</h1>

    <div class="envelope-wrapper" id="envelopeWrapper" onclick="toggleEnvelope()">
        <div class="envelope-back"></div>
        <div class="top-flap"></div>
        
        <div class="card" onclick="event.stopPropagation();">
            
            <div class="gender-reveal-title">
                <span class="word-boy">BOY</span>
                <span class="word-or">OR</span>
                <span class="word-girl">GIRL?</span>
            </div>
            
            <p class="subtitle">Come help us guess the sweet mystery!</p>

            <div class="event-details">
                <p style="color: #444; margin-bottom: 6px; font-size: 1.1rem;"><strong>June 13, 2026 at 2:00 PM</strong></p>
                <p style="font-size: 0.95rem; color: #888;">Junbel Mountain Resort</p>
                <a style="font-size: 0.95rem; color: #888;" href="https://surl.li/xmyidf" target="_blank" rel="noopener noreferrer">View Location</a>
            </div>
            
        </div>

        <div class="envelope-front-pocket"></div>
        <div class="bottom-flap"></div>
    </div>

    <script>
        function toggleEnvelope() {
            const wrapper = document.getElementById('envelopeWrapper');
            const title = document.getElementById('mainTitle');
            
            const isOpening = !wrapper.classList.contains('open');
            
            wrapper.classList.toggle('open');
            title.classList.toggle('fade-out');

            if (isOpening) {
                setTimeout(() => {
                    const duration = 2500;
                    const end = Date.now() + duration;

                    (function frame() {
                        confetti({
                            particleCount: 5,
                            angle: 60,
                            spread: 55,
                            origin: { x: 0 },
                            colors: ['#88c9d9', '#f4a6b5', '#ffffff'] 
                        });
                        confetti({
                            particleCount: 5,
                            angle: 120,
                            spread: 55,
                            origin: { x: 1 },
                            colors: ['#88c9d9', '#f4a6b5', '#ffffff']
                        });

                        if (Date.now() < end) {
                            requestAnimationFrame(frame);
                        }
                    }());
                }, 400); 
            }
        }
    </script>
</body>
</html>
